<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro - Sistema APB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="container-main">
    <div id="sidebar-container"></div>
    <div class="main-content w-full">
      <div id="navbar-container"></div>
      <div class="p-6">
        <div id="messages"></div>

        <h2 class="text-2xl font-bold mb-6">Financeiro</h2>

        <!-- Abas -->
        <div class="flex gap-2 mb-6 border-b">
          <button class="aba-btn active px-4 py-2 border-b-2 border-blue-600 font-semibold" data-aba="receber">
            Contas a Receber
          </button>
          <button class="aba-btn px-4 py-2 border-b-2 border-transparent font-semibold" data-aba="ranking">
            Ranking de Clientes
          </button>
          <button class="aba-btn px-4 py-2 border-b-2 border-transparent font-semibold" data-aba="lucro">
            Análise de Lucro
          </button>
        </div>

        <!-- Aba Contas a Receber -->
        <div id="aba-receber" class="aba-content">
          <div class="card">
            <div class="card-header">Serviços Pendentes de Pagamento</div>
            <div class="overflow-x-auto">
              <table class="table-responsive">
                <thead>
                  <tr>
                    <th>Data</th>
                    <th>Cliente</th>
                    <th>Valor</th>
                    <th>Vencimento</th>
                    <th>Dias Vencido</th>
                    <th>Status</th>
                    <th>Ações</th>
                  </tr>
                </thead>
                <tbody id="contas-tbody"></tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- Aba Ranking -->
        <div id="aba-ranking" class="aba-content hidden">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="card">
              <div class="card-header">Top 5 - Maior Faturamento</div>
              <div id="ranking-faturamento"></div>
            </div>
            <div class="card">
              <div class="card-header">Top 5 - Maior Lucro</div>
              <div id="ranking-lucro"></div>
            </div>
          </div>
        </div>

        <!-- Aba Lucro -->
        <div id="aba-lucro" class="aba-content hidden">
          <div class="card">
            <div class="card-header">Margem de Lucro por Cliente (Mês)</div>
            <canvas id="chartLucro"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Pagamento -->
  <div id="modal-pagamento" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span>Registrar Pagamento</span>
        <button class="float-right text-2xl leading-none cursor-pointer" id="btn-fechar-modal">×</button>
      </div>
      <form id="form-pagamento">
        <div class="form-group">
          <label class="form-label">Valor</label>
          <input type="number" class="form-input" id="pag-valor" step="0.01" required readonly />
        </div>
        <div class="form-group">
          <label class="form-label">Data de Pagamento</label>
          <input type="date" class="form-input" id="pag-data" required />
        </div>
        <div class="form-group">
          <label class="form-label">Forma de Pagamento</label>
          <select class="form-select" id="pag-forma">
            <option value="pix">PIX</option>
            <option value="transferencia">Transferência</option>
            <option value="dinheiro">Dinheiro</option>
            <option value="boleto">Boleto</option>
            <option value="cartao_credito">Cartão de Crédito</option>
            <option value="cartao_debito">Cartão de Débito</option>
            <option value="cheque">Cheque</option>
            <option value="outro">Outro</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Observação</label>
          <input type="text" class="form-input" id="pag-observacao" placeholder="Comprovante, referência, etc." />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancelar-pag">Cancelar</button>
          <button type="submit" class="btn btn-primary">Confirmar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/financeiro.js"></script>
</body>
</html>
