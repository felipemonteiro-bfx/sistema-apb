<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dashboard - Sistema APB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="container-main">
    <div id="sidebar-container"></div>
    <div class="main-content w-full">
      <div id="navbar-container"></div>
      <div class="p-6">
        <div id="messages"></div>

        <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
          <h2 class="page-title">Dashboard</h2>
          <div class="flex items-center gap-2">
            <label class="text-sm text-gray-600">Período:</label>
            <select id="dashboard-mes" class="form-select py-2 w-36">
              <option value="1">Janeiro</option><option value="2">Fevereiro</option><option value="3">Março</option>
              <option value="4">Abril</option><option value="5">Maio</option><option value="6">Junho</option>
              <option value="7">Julho</option><option value="8">Agosto</option><option value="9">Setembro</option>
              <option value="10">Outubro</option><option value="11">Novembro</option><option value="12">Dezembro</option>
            </select>
            <select id="dashboard-ano" class="form-select py-2 w-24"></select>
            <button class="btn btn-secondary" id="btn-exportar-csv-dash">Exportar CSV</button>
            <button class="btn btn-secondary" id="btn-exportar-pdf-dash">Exportar PDF</button>
          </div>
        </div>
        <!-- Grid de Cards Principais -->
        <div class="grid-dashboard">
          <div class="stat-card">
            <div class="stat-label">Faturamento Mês</div>
            <div class="stat-value text-blue-600" id="faturamento-valor">R$ 0,00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Lucro Mês</div>
            <div class="stat-value text-green-600" id="lucro-valor">R$ 0,00</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Serviços Realizados</div>
            <div class="stat-value text-purple-600" id="servicos-valor">0</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Contas a Receber</div>
            <div class="stat-value text-orange-600" id="receber-valor">R$ 0,00</div>
          </div>
        </div>

        <!-- Gráficos -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
          <div class="card">
            <div class="card-header">Faturamento por Cliente</div>
            <canvas id="chartClientes"></canvas>
          </div>
          <div class="card">
            <div class="card-header">Status dos Serviços</div>
            <canvas id="chartStatus"></canvas>
          </div>
        </div>

        <!-- Últimos Serviços -->
        <div class="card">
          <div class="card-header flex items-center justify-between">
            <span>Últimos Serviços</span>
            <a href="/src/pages/servicos.html" class="text-blue-600 text-sm hover:underline">Ver todos →</a>
          </div>
          <div class="overflow-x-auto">
            <table class="table-responsive">
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Data</th>
                  <th>Chapas</th>
                  <th>Valor</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="ultimos-servicos"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
