<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Sistema APB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
  <style>body{font-family:'Plus Jakarta Sans',system-ui,sans-serif}</style>
</head>
<body class="login-page min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
  <!-- Imagem de fundo - logística/armazém, 40% de opacidade -->
  <div class="login-bg-image absolute inset-0 bg-cover bg-center bg-no-repeat" style="background-image: url('/bg-login.png'); opacity: 0.4;"></div>
  <!-- Overlay escuro para manter legibilidade do formulário -->
  <div class="absolute inset-0 bg-gradient-to-br from-slate-900/85 via-blue-900/80 to-slate-900/85"></div>
  <div class="relative z-10 w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-8 border border-slate-200/50">
      <div class="text-center mb-8">
        <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center font-bold text-white text-xl mx-auto mb-4 shadow-lg">A</div>
        <h1 class="text-2xl font-bold text-slate-800">Sistema APB</h1>
        <p class="text-slate-500 mt-1">Entre para continuar</p>
      </div>

      <div id="login-message" class="hidden mb-4 p-3 rounded-lg text-sm"></div>

      <form id="form-login" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
          <input
            type="email"
            id="login-email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="seu@email.com"
            required
            autocomplete="email"
          />
        </div>
        <div id="confirm-senha-wrap" class="hidden">
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirmar senha</label>
          <input
            type="password"
            id="login-confirm-senha"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
          <input
            type="password"
            id="login-senha"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          />
        </div>
        <button
          type="submit"
          id="btn-login"
          class="w-full py-3 bg-gradient-to-r from-sky-500 to-indigo-500 hover:from-sky-600 hover:to-indigo-600 text-white font-semibold rounded-xl transition shadow-md"
        >
          Entrar
        </button>
        <p class="text-center text-sm text-gray-600">
          Primeira vez?
          <button type="button" id="toggle-criar-conta" class="text-blue-600 hover:underline">
            Criar conta
          </button>
          ou
          <a href="/src/pages/criar-admin.html" class="text-blue-600 hover:underline">Criar admin</a>
        </p>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="px-2 bg-white text-gray-500">ou</span>
        </div>
      </div>

      <button
        type="button"
        id="btn-google"
        class="w-full py-3 flex items-center justify-center gap-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition"
      >
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Entrar com Google
      </button>
    </div>
    <p class="text-center text-white/80 text-sm mt-4 relative z-10">Gestão de clientes, chapas e serviços — Manaus</p>
  </div>

  <script type="module" src="../js/login.js"></script>
</body>
</html>
