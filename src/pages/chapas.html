<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1e3a5f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Chapas - Sistema APB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="container-main">
    <div id="sidebar-container"></div>
    <div class="main-content w-full">
      <div id="navbar-container"></div>
      <div class="p-6">
        <div id="messages"></div>

        <div class="flex justify-between items-center mb-6">
          <h2 class="page-title">Chapas</h2>
          <button class="btn btn-primary" id="btn-nova-chapa">+ Nova Chapa</button>
        </div>

        <div class="card">
          <div class="overflow-x-auto">
            <table class="table-responsive">
              <thead>
                <tr>
                  <th>Nome</th>
                  <th>CPF</th>
                  <th>Telefone</th>
                  <th>Email</th>
                  <th>Valor Diária</th>
                  <th>Chave PIX</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="chapas-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Chapa -->
  <div id="modal-chapa" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <span id="modal-titulo">Nova Chapa</span>
        <button class="float-right text-2xl leading-none cursor-pointer" id="btn-fechar-modal">×</button>
      </div>
      <form id="form-chapa">
        <div class="form-group">
          <label class="form-label">Nome</label>
          <input type="text" class="form-input" id="chapa-nome" required />
        </div>
        <div class="form-group">
          <label class="form-label">CPF</label>
          <input type="text" class="form-input" id="chapa-cpf" required />
        </div>
        <div class="form-group">
          <label class="form-label">Telefone</label>
          <input type="tel" class="form-input" id="chapa-telefone" />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="chapa-email" />
        </div>
        <div class="form-group">
          <label class="form-label">Valor da Diária</label>
          <input type="number" class="form-input" id="chapa-valor" step="0.01" required />
        </div>
        <div class="form-group">
          <label class="form-label">Chave PIX</label>
          <input type="text" class="form-input" id="chapa-pix" />
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancelar">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/chapas.js"></script>
</body>
</html>
