<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Serviços - Sistema APB</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="container-main">
    <div id="sidebar-container"></div>
    <div class="main-content w-full">
      <div id="navbar-container"></div>
      <div class="p-6">
        <div id="messages"></div>

        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Registro de Serviços</h2>
          <button class="btn btn-primary" id="btn-novo-servico">+ Novo Serviço</button>
        </div>

        <div class="card">
          <div class="overflow-x-auto">
            <table class="table-responsive">
              <thead>
                <tr>
                  <th>Data</th>
                  <th>Cliente</th>
                  <th>Local</th>
                  <th>Chapas</th>
                  <th>Valor Total</th>
                  <th>Custos</th>
                  <th>Lucro</th>
                  <th>Status</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="servicos-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal de Serviço -->
  <div id="modal-servico" class="modal">
    <div class="modal-content max-w-2xl">
      <div class="modal-header">
        <span>Novo Serviço</span>
        <button class="float-right text-2xl leading-none cursor-pointer" id="btn-fechar-modal">×</button>
      </div>
      <form id="form-servico">
        <div class="grid grid-cols-2 gap-4">
          <div class="form-group">
            <label class="form-label">Data do Serviço</label>
            <input type="date" class="form-input" id="servico-data" required />
          </div>
          <div class="form-group">
            <label class="form-label">Cliente</label>
            <select class="form-select" id="servico-cliente" required></select>
          </div>
          <div class="form-group">
            <label class="form-label">Quantidade de Chapas</label>
            <input type="number" class="form-input" id="servico-quantidade" min="1" required />
          </div>
          <div class="form-group">
            <label class="form-label">Valor por Chapa</label>
            <input type="number" class="form-input" id="servico-valor" step="0.01" required />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Valor Total</label>
          <input type="number" class="form-input" id="servico-total" disabled step="0.01" />
        </div>

        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="servico-status">
            <option value="agendado">Agendado</option>
            <option value="executado">Executado</option>
            <option value="faturado">Faturado</option>
            <option value="recebido">Recebido</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Local do Serviço</label>
          <input type="text" class="form-input" id="servico-local" placeholder="Endereço ou local de execução" />
        </div>

        <div class="form-group">
          <label class="form-label">Observações</label>
          <textarea class="form-textarea" id="servico-obs" rows="3"></textarea>
        </div>

        <!-- Notas Fiscais (visível ao editar) -->
        <div id="notas-fiscais-section" class="border-t pt-4 mt-4 hidden">
          <h3 class="font-semibold mb-3">Notas Fiscais</h3>
          <div id="notas-fiscais-lista" class="mb-3 space-y-2"></div>
          <div id="nota-fiscal-form" class="grid grid-cols-2 gap-2 p-3 bg-gray-50 rounded">
            <input type="text" class="form-input" id="nf-numero" placeholder="Nº NF" />
            <input type="number" class="form-input" id="nf-valor" placeholder="Valor" step="0.01" />
            <input type="date" class="form-input" id="nf-data-emissao" />
            <select class="form-select" id="nf-status">
              <option value="pendente">Pendente</option>
              <option value="emitida">Emitida</option>
              <option value="enviada">Enviada</option>
              <option value="cancelada">Cancelada</option>
            </select>
            <input type="url" class="form-input col-span-2" id="nf-link-pdf" placeholder="Link do PDF" />
            <button type="button" class="btn btn-primary btn-sm" id="btn-add-nf">+ Adicionar NF</button>
          </div>
        </div>

        <!-- Custos -->
        <div class="border-t pt-4 mt-4">
          <h3 class="font-semibold mb-3">Custos Adicionais</h3>
          <div id="custos-container"></div>
          <button type="button" class="btn btn-secondary btn-sm" id="btn-add-custo">+ Adicionar Custo</button>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" id="btn-cancelar">Cancelar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/servicos.js"></script>
</body>
</html>
